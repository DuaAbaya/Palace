<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Products - Dua Abaya Palace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@400;500;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .admin-page {
            padding: 48px 20px 60px;
            background: var(--light-beige);
            min-height: 100vh;
        }

        [data-theme="dark"] .admin-page {
            background: var(--primary-black);
        }

        .admin-wrap {
            max-width: 980px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
        }

        .admin-card {
            background: var(--white);
            border-radius: 14px;
            padding: 22px;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] .admin-card {
            background: var(--off-white);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .admin-grid .full {
            grid-column: 1 / -1;
        }

        .admin-products-list {
            display: grid;
            gap: 10px;
        }

        .admin-product-row {
            display: grid;
            grid-template-columns: 56px 1fr auto;
            gap: 12px;
            align-items: center;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.7);
        }

        .admin-product-row img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 8px;
        }

        .admin-note {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 8px;
        }

        @media (max-width: 700px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">Dua <span>Abaya</span> Palace</a>
            <ul class="navbar-menu">
                <li><a href="index.html" class="navbar-link">Home</a></li>
                <li><a href="shop.html" class="navbar-link">Shop</a></li>
                <li><a href="admin-products.html" class="navbar-link active">Admin</a></li>
            </ul>
            <div class="navbar-actions">
                <button class="navbar-icon theme-toggle" onclick="toggleTheme()">&#127769;</button>
                <a href="cart.html" class="navbar-icon"><i class="fas fa-shopping-bag"></i><span class="cart-count">0</span></a>
                <button class="navbar-toggle"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <section class="admin-page">
        <div class="admin-wrap" id="adminApp" style="display:none;">
            <div class="admin-card">
                <h2 style="margin-bottom: 10px;">Add Product (Admin Only)</h2>
                <form id="adminProductForm">
                    <div class="admin-grid">
                        <div class="form-group">
                            <label for="adminName">Product Name</label>
                            <input id="adminName" type="text" required>
                        </div>
                        <div class="form-group">
                            <label for="adminPrice">Price (INR)</label>
                            <input id="adminPrice" type="number" min="0.01" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="adminOriginalPrice">Original Price (INR, optional)</label>
                            <input id="adminOriginalPrice" type="number" min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label for="adminCategory">Category</label>
                            <input id="adminCategory" type="text" value="Closed Abaya">
                        </div>
                        <div class="form-group full">
                            <label for="adminDescription">Description</label>
                            <textarea id="adminDescription" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="adminMainImage">Main Image</label>
                            <input id="adminMainImage" type="file" accept="image/*" required>
                        </div>
                        <div class="form-group">
                            <label for="adminGalleryImages">Gallery Images (optional)</label>
                            <input id="adminGalleryImages" type="file" accept="image/*" multiple>
                        </div>
                        <div class="form-group">
                            <label for="adminSizes">Sizes (comma)</label>
                            <input id="adminSizes" type="text" value="S,M,L,XL">
                        </div>
                        <div class="form-group">
                            <label for="adminColors">Colors (comma)</label>
                            <input id="adminColors" type="text" value="Black">
                        </div>
                        <div class="form-group full">
                            <button type="submit" class="btn btn-primary">Add Product</button>
                            <p class="admin-note">Only admin panel se add kiye products remove kiye ja sakte hain.</p>
                        </div>
                    </div>
                </form>
            </div>

            <div class="admin-card">
                <h3 style="margin-bottom: 12px;">Added Products</h3>
                <div class="admin-products-list" id="adminProductsList"></div>
            </div>
        </div>

        <div class="admin-wrap" id="adminDenied" style="display:none;">
            <div class="admin-card">
                <h2>Admin Access Required</h2>
                <p>Please open this page with admin code.</p>
            </div>
        </div>
    </section>

    <div class="toast"></div>

    <script src="js/main.js"></script>
    <script>
        const ADMIN_CODE = 'admin9415';
        const INR_PER_USD = 83;

        document.addEventListener('DOMContentLoaded', () => {
            initializeApp();
            checkAdminAccess();
        });

        function checkAdminAccess() {
            const cached = sessionStorage.getItem('admin_products_auth') === '1';
            if (!cached) {
                const code = window.prompt('Enter admin code to open product manager');
                if (code !== ADMIN_CODE) {
                    document.getElementById('adminDenied').style.display = 'grid';
                    showToast('Admin access denied', 'error');
                    return;
                }
                sessionStorage.setItem('admin_products_auth', '1');
            }

            document.getElementById('adminApp').style.display = 'grid';
            bindAdminForm();
            renderAdminProducts();
        }

        function filesToDataUrls(files) {
            return Promise.all(Array.from(files).map(file => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result));
                reader.onerror = reject;
                reader.readAsDataURL(file);
            })));
        }

        function parseCsv(text, fallback) {
            const parts = String(text || '').split(',').map(v => v.trim()).filter(Boolean);
            return parts.length ? parts : fallback;
        }

        function bindAdminForm() {
            const form = document.getElementById('adminProductForm');
            if (!form || form.dataset.bound) return;
            form.dataset.bound = '1';

            form.addEventListener('submit', async (event) => {
                event.preventDefault();

                const mainImageInput = document.getElementById('adminMainImage');
                const galleryInput = document.getElementById('adminGalleryImages');
                if (!mainImageInput.files.length) {
                    showToast('Main image is required', 'error');
                    return;
                }

                const name = document.getElementById('adminName').value.trim();
                const priceInr = Number(document.getElementById('adminPrice').value || 0);
                const price = priceInr > 0 ? Number((priceInr / INR_PER_USD).toFixed(2)) : 0;
                if (!name || priceInr <= 0) {
                    showToast('Name and valid price are required', 'error');
                    return;
                }

                const [mainImage] = await filesToDataUrls(mainImageInput.files);
                const galleryImages = galleryInput.files.length ? await filesToDataUrls(galleryInput.files) : [];

                const productData = {
                    name,
                    price,
                    originalPrice: (function () {
                        const originalInr = Number(document.getElementById('adminOriginalPrice').value || 0);
                        return originalInr > 0 ? Number((originalInr / INR_PER_USD).toFixed(2)) : 0;
                    })(),
                    category: document.getElementById('adminCategory').value.trim() || 'Closed Abaya',
                    description: document.getElementById('adminDescription').value.trim(),
                    image: mainImage,
                    images: [mainImage, ...galleryImages],
                    sizes: parseCsv(document.getElementById('adminSizes').value, ['S', 'M', 'L', 'XL']),
                    colors: parseCsv(document.getElementById('adminColors').value, ['Black']),
                    rating: 5,
                    reviews: 0,
                    fabric: 'Premium Nidha',
                    badge: 'new'
                };

                window.addAdminProduct(productData);
                showToast('Product added successfully!');
                form.reset();
                document.getElementById('adminCategory').value = 'Closed Abaya';
                document.getElementById('adminSizes').value = 'S,M,L,XL';
                document.getElementById('adminColors').value = 'Black';
                renderAdminProducts();
            });
        }

        function renderAdminProducts() {
            const list = document.getElementById('adminProductsList');
            if (!list) return;

            const customProducts = window.getAdminProducts();
            if (!customProducts.length) {
                list.innerHTML = '<p class="admin-note">No admin products added yet.</p>';
                return;
            }

            list.innerHTML = customProducts.map(product => `
                <div class="admin-product-row">
                    <img src="${product.image}" alt="${product.name}">
                    <div>
                        <strong>${product.name}</strong>
                        <div>Price: INR ${Number((Number(product.price || 0) * INR_PER_USD).toFixed(2))}</div>
                    </div>
                    <button type="button" class="btn btn-secondary" data-remove-id="${product.id}">Delete</button>
                </div>
            `).join('');

            list.querySelectorAll('[data-remove-id]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = Number(btn.dataset.removeId);
                    if (!window.removeAdminProduct(id)) {
                        showToast('Unable to delete product', 'error');
                        return;
                    }
                    showToast('Product deleted');
                    renderAdminProducts();
                });
            });
        }
    </script>
</body>
</html>
